<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Страница не найдена · Портфолио Кульбеда Анастасии</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter Tight',sans-serif;background:#0b1345;color:#17206b;
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:48px 20px;overflow-x:hidden}
  .e404{position:relative;width:min(560px,88vw)}
  .e-sheet{position:relative;z-index:1;
    background:url("skills-assets/modal-bg.png") center/100% 100% no-repeat;
    filter:hue-rotate(-6deg) saturate(1.05);padding:15% 13% 17%}
  .e-sheet h1{font:700 clamp(38px,7vw,64px)/1.02 'Inter Tight',sans-serif;letter-spacing:.01em;color:#17206b}
  .e-sheet p{font:500 clamp(15px,2.4vw,19px)/1.4 'Inter Tight',sans-serif;color:#3f4fa0;margin:18px 0 28px}
  .e-btn{display:inline-flex;align-items:center;gap:8px;background:#16206a;color:#e2e7ff;text-decoration:none;
    font:400 clamp(17px,2.6vw,22px) 'Caveat',cursive;letter-spacing:.01em;padding:12px 28px;border-radius:3px;
    transform:rotate(-1deg);box-shadow:0 10px 22px rgba(4,8,50,.45);transition:transform .3s ease}
  .e-btn:hover{transform:rotate(-1deg) translateY(-3px)}
  .e-note{position:absolute;z-index:2;right:-7%;bottom:-9%;width:35%;aspect-ratio:1/1.03;
    background:#f1e7de;border-radius:4px;box-shadow:0 18px 42px rgba(2,6,40,.5);transform:rotate(6deg);
    display:flex;align-items:center;justify-content:center;
    font:700 clamp(52px,9vw,88px) 'Caveat',cursive;color:#17206b}
  .e-note::after{content:"";position:absolute;left:0;bottom:0;width:34px;height:34px;
    background:linear-gradient(45deg,transparent 50%,#dccfc0 50%);border-bottom-left-radius:4px}
  @media (max-width:720px){
    .e404{width:min(420px,90vw);display:flex;flex-direction:column;align-items:center}
    .e-note{order:-1;position:relative;right:auto;bottom:auto;width:54%;margin:0 0 -26px;transform:rotate(-6deg)}
    .e-sheet{width:100%;padding:20% 14% 20%}
  }
</style>
</head>
<body>
  <main class="e404">
    <div class="e-sheet">
      <h1>Страница<br>не найдена</h1>
      <p>Нужный стикер отклеился<br>или ссылка больше не работает</p>
      <a class="e-btn" href="/">Вернуться на главную ↗</a>
    </div>
    <div class="e-note">404</div>
  </main>
</body>
</html>
